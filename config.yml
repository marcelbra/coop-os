agent_harness_command: claude

task_statuses:
  todo: "○"
  in_progress: "◉"
  waiting: "…"
  done: "✓"
  cancelled: "✗"

milestone_statuses:
  active: "•"
  completed: "✓"
  cancelled: "✗"

role_statuses:
  active: "◆"
  inactive: "◇"

recurring_task_statuses:
  active: "•"
  paused: "»"
  archived: "✗"

occurrence_statuses:
  pending: "○"
  done: "✓"
  skipped: "»"
  missed: "!"

# Default IANA timezone used when a recurring task or task omits one.
workspace_timezone: Europe/Amsterdam
